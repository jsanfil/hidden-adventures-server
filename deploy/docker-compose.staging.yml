services:
  app:
    image: ${APP_IMAGE:?set APP_IMAGE}
    restart: unless-stopped
    env_file:
      - ./env/staging.env
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
